<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crumb & Co. | Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff8ec, #f3e3cc, #e8d0ae);
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }
body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255, 248, 236, 0.78), rgba(234, 210, 180, 0.84)),
                url("pics/pic2.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: saturate(1.08) brightness(1.03);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(255, 225, 180, 0.35), transparent 35%),
                radial-gradient(circle at bottom right, rgba(155, 107, 67, 0.18), transparent 38%);
            z-index: -1;
        }


        .login-container {
            width: 900px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .left-panel {
            background: linear-gradient(180deg, #f0d7b6, #d8b18c);
            padding: 50px 40px;
            color: #5e3c23;
        }

        .left-panel h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            margin-bottom: 15px;
        }

        .left-panel p {
            line-height: 1.8;
        }

        .pastry {
            text-align: center;
            margin-top: 25px;
        }

        .pastry img {
            width: 280px;
            height: auto;
            object-fit: contain;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .right-panel {
            padding: 50px;
            background: #fffdf8;
        }

        .right-panel h2 {
            font-family: 'Playfair Display', serif;
            color: #7c5637;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #9d7b5d;
            margin-bottom: 30px;
        }

        .form-label {
            color: #6a4a30;
            font-weight: 500;
        }

        .form-control {
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #e1c6a7;
            background-color: #fffaf5;
        }

        .form-control:focus {
            border-color: #bc9368;
            box-shadow: 0 0 0 0.2rem rgba(188, 147, 104, 0.25);
        }

        .btn-login {
            width: 100%;
            border: none;
            padding: 13px;
            border-radius: 15px;
            background: #9b6b43;
            color: white;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #7c5637;
            transform: translateY(-2px);
        }

        .error {
            display: none;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint {
            margin-top: 20px;
            background: #fff1dc;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #7a5b43;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #9d7b5d;
            font-size: 13px;
        }

        @media(max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }

            .left-panel {
                text-align: center;
                padding: 35px 25px;
            }

            .left-panel h1 {
                font-size: 38px;
            }

            .pastry img {
                width: 180px;
            }

            .right-panel {
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="left-panel">
            <h1>Crumb & Co.</h1>

            <p>
                Freshly baked pastries, buttery croissants, flaky danish and sweet treats
                made with love every day.
            </p>

            <div class="pastry">
                <img src="pics/pic1.png" alt="Bakery Pastry">
            </div>

            <p class="text-center mt-3">
                ✨ Freshly baked. Freshly loved.
            </p>
        </div>

        <div class="right-panel">
            <h2>Welcome!</h2>

            <p class="subtitle">
                Welcome back to Crumb & Co. Let's make today delicious.
            </p>

            <div id="errorMessage" class="error"></div>

            <form onsubmit="return loginUser()">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password">
                </div>

                <button type="submit" class="btn-login">
                    Login
                </button>
            </form>

            
            <div class="footer-text">
                © 2026 Crumb & Co. Bakery System
            </div>
        </div>

    </div>
	

    <script>
        function loginUser() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let errorMessage = document.getElementById("errorMessage");

            if (username === "admin" && password === "12345") {
                errorMessage.style.display = "block";
                errorMessage.style.background = "#e7f7eb";
                errorMessage.style.color = "#2d7a46";
                errorMessage.innerHTML = "✓ Login successful! Redirecting to dashboard...";

                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 1500);

                return false;
            } else {
                errorMessage.style.display = "block";
                errorMessage.style.background = "#ffe4dd";
                errorMessage.style.color = "#b3421f";
                errorMessage.innerHTML = "✕ Invalid username or password. Please try again.";

                return false;
            }
        }
    </script>

</body>
</html>
